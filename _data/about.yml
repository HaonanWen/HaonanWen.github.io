intro: "I am a second-year Master's student in Computer Technology at Beijing Jiaotong University, advised by Prof. <a href=\"https://faculty.bjtu.edu.cn/8407/\">Songhe Feng</a>. I received my Bachelor's degree in Computer Science and Technology from Beijing Jiaotong University. My current research interests focus on time series forecasting, test-time adaptation and LLM agents"
collaboration: "I am actively looking for research collaboration opportunities and Ph.D. positions. It is my honor to collaborate with researchers from diverse backgrounds."
